<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmΔrt Color Picker — Embed Demo</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, "Segoe UI", sans-serif;
        background: #1a1d2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        gap: 16px;
      }
      h1 { margin: 0; font-weight: 600; }
      .swatch {
        width: 240px;
        height: 60px;
        border-radius: 8px;
        background: #6366f1;
        border: 1px solid rgba(255,255,255,0.1);
        transition: background 0.2s;
      }
      iframe {
        border: 0;
        width: 420px;
        height: 560px;
        background: transparent;
      }
      code {
        background: rgba(0,0,0,0.4);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Cascadia Code", monospace;
      }
    </style>
  </head>
  <body>
    <h1>SmΔrt Color Picker — iframe embed demo</h1>
    <div class="swatch" id="swatch"></div>
    <p>Picked: <code id="hex">#6366f1</code></p>
    <iframe id="picker" src="./smart-color-picker.html"></iframe>

    <script>
      const frame = document.getElementById("picker");
      const swatch = document.getElementById("swatch");
      const hex = document.getElementById("hex");

      // Open with a starting color once the iframe is ready
      frame.addEventListener("load", () => {
        frame.contentWindow.postMessage(
          { type: "scp:open", color: "#6366f1", theme: "dark" },
          "*"
        );
      });

      // Listen for color updates
      window.addEventListener("message", (e) => {
        if (!e.data || typeof e.data !== "object") return;
        if (e.data.type === "scp:color" || e.data.type === "scp:commit") {
          const css = e.data.rgba || e.data.hex;
          if (!css) return;
          swatch.style.background = css;
          hex.textContent = e.data.hex || css;
        }
      });
    </script>
  </body>
</html>
